      - 2.2.5 优化与正则化: ch2-round1/2-2-5-optimization-regularization.md
    - 2.3 卷积神经网络入门:
      - 2.3.1 卷积与池化: ch2-round1/2-3-1-conv-pooling.md
      - 2.3.2 图像分类实战: ch2-round1/2-3-2-image-classification.md
      - 2.3.3 迁移学习与预训练编码器: ch2-round1/2-3-3-transfer-learning.md
