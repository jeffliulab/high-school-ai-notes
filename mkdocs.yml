site_name: 高中人工智能笔记
site_author: Jeff Liu
site_url: https://jeffliulab.github.io/high-school-ai-notes/
repo_url: https://github.com/jeffliulab/high-school-ai-notes
repo_name: high-school-ai-notes
copyright: USAAIO / IOAI / IAIO 备赛笔记 — High School AI Notes

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    scheme: default
    primary: custom
    accent: custom

plugins:
  - search
  - glightbox
  - i18n:
      docs_structure: suffix
      languages:
        - locale: zh
          default: true
          name: 中文
          build: true
        - locale: en
          name: English
          build: true
          site_name: "High School AI Notes"
          nav_translations:
            首页: Home
            第1章 入门与基础: "Ch.1 Getting Started"
            第2章 Round 1 · 资格赛: "Ch.2 Round 1 · Qualifier"
            第3章 Round 2 · 邀请赛: "Ch.3 Round 2 · Invitational"
            第4章 Camp · 集训营: "Ch.4 Camp"
            第5章 Champion · 国际赛: "Ch.5 Champion · International"
            附录: Appendix
            1.3 数学基础: "1.3 Math Foundations"
            1.4 编程基础: "1.4 Programming Foundations"
            2.1 经典机器学习: "2.1 Classical ML"
            2.2 深度学习入门: "2.2 Deep Learning Basics"
            2.3 卷积神经网络入门: "2.3 CNN Basics"
            2.4 Round 1 备考: "2.4 Round 1 Prep"
            3.1 深度学习进阶: "3.1 Advanced DL"
            3.2 注意力与 Transformer: "3.2 Attention & Transformer"
            3.3 计算机视觉进阶: "3.3 Advanced CV"
            3.4 NLP 与音频: "3.4 NLP & Audio"
            3.5 Round 2 备考: "3.5 Round 2 Prep"
            4.1 竞赛工程方法: "4.1 Competition Engineering"
            4.2 IOAI 真题精讲: "4.2 IOAI Past Problems"
            5.1 IOAI 实战: "5.1 IOAI"
            5.2 IAIO 实战: "5.2 IAIO"
            5.3 夺牌冲刺: "5.3 Final Sprint"

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - mdx_truly_sane_lists:
      nested_indent: 2
  - toc:
      permalink: true

extra_javascript:
  - javascripts/katex.js
  - javascripts/soma_sidebar.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

extra_css:
  - https://unpkg.com/katex@0/dist/katex.min.css
  - stylesheets/extra.css

nav:
  - 首页: index.md

  - 第1章 入门与基础:
    - 1.1 赛事与赛程介绍: ch1-intro/1-1-competitions.md
    - 1.2 考纲总览与学习路线: ch1-intro/1-2-syllabus-roadmap.md
    - 1.3 数学基础:
      - 1.3.1 线性代数: ch1-intro/1-3-1-linear-algebra.md
      - 1.3.2 微积分与梯度: ch1-intro/1-3-2-calculus-gradients.md
      - 1.3.3 概率与统计: ch1-intro/1-3-3-probability-statistics.md
      - 1.3.4 凸优化基础: ch1-intro/1-3-4-convex-optimization.md
    - 1.4 编程基础:
      - 1.4.1 Python 基础: ch1-intro/1-4-1-python.md
      - 1.4.2 NumPy 与张量: ch1-intro/1-4-2-numpy-tensors.md
      - 1.4.3 Pandas 与数据处理: ch1-intro/1-4-3-pandas-data.md
      - 1.4.4 数据可视化: ch1-intro/1-4-4-visualization.md
      - 1.4.5 Colab 与 Markdown: ch1-intro/1-4-5-colab-markdown.md

